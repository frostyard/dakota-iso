name: Build and Publish Snow Live ISO

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 4 * * *'   # daily, 04:00 UTC
  workflow_dispatch:
    inputs:
      installer_channel:
        description: 'Installer flatpak channel (dev until frostyard/bootc-installer tags a stable release)'
        required: false
        default: dev
        type: string
      skip_upload:
        description: 'Build ISO but skip uploading to R2 (dry run)'
        required: false
        default: false
        type: boolean

env:
  PAYLOAD_IMAGE: ghcr.io/frostyard/snow:latest
  LIVE_TARGET: snow
  ISO_NAME: snow-live
  R2_BUCKET_PATH: frostyardrepo/isos

jobs:
  build-and-publish:
    name: Build Snow Live ISO
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y podman buildah skopeo \
            mtools xorriso squashfs-tools dosfstools isomd5sum

      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull offline payload image
        run: sudo podman pull "$PAYLOAD_IMAGE"

      - name: Build live container
        run: |
          sudo podman build \
            --cap-add sys_admin --security-opt label=disable \
            --layers \
            --build-arg TARGET="$LIVE_TARGET" \
            --build-arg TAG=latest \
            --build-arg REGISTRY=frostyard \
            --build-arg INSTALLER_CHANNEL="${{ inputs.installer_channel || 'dev' }}" \
            -t "localhost/${LIVE_TARGET}-live:latest" \
            ./live

      - name: Build live squashfs + boot tar
        env:
          SUPERISO_COMPRESSION: release
          SUPERISO_TMPDIR: /var/iso-build
        run: |
          sudo mkdir -p /var/iso-build
          sudo -E bash scripts/build-live-squashfs.sh \
            --oci-image "$PAYLOAD_IMAGE" \
            "localhost/${LIVE_TARGET}-live:latest" \
            "/var/iso-build/${LIVE_TARGET}.rootfs.sfs" \
            "/var/iso-build/${LIVE_TARGET}-boot.tar"

      - name: Verify offline OCI store is embedded
        run: |
          # snow uses composeFsBackend=true; build-live-squashfs.sh embeds the
          # OCI store as a VFS store at var/lib/containers/storage.
          if ! sudo unsquashfs -lc "/var/iso-build/${LIVE_TARGET}.rootfs.sfs" \
              var/lib/containers/storage 2>/dev/null | grep -q "squashfs-root"; then
            echo "ERROR: VFS store missing — OCI embedding failed" >&2
            exit 1
          fi
          echo ">>> OCI store assertion passed (VFS store present)"

      - name: Assemble ISO
        run: |
          sudo bash live/src/build-iso.sh \
            --title "Snow Linux Live" \
            "/var/iso-build/${LIVE_TARGET}-boot.tar" \
            "/var/iso-build/${LIVE_TARGET}.rootfs.sfs" \
            "/var/iso-build/${ISO_NAME}.iso"
          mkdir -p output
          sudo cp "/var/iso-build/${ISO_NAME}.iso" output/
          sudo chown -R "$USER:$(id -gn)" output/

      - name: Compute ISO name
        id: iso
        run: |
          echo "path=output/${ISO_NAME}.iso" >> "$GITHUB_OUTPUT"
          echo "latest_name=${ISO_NAME}-latest.iso" >> "$GITHUB_OUTPUT"

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          ISO="${{ steps.iso.outputs.path }}"
          LATEST_NAME="${{ steps.iso.outputs.latest_name }}"
          LATEST_CHECKSUM_PATH="output/${LATEST_NAME}-CHECKSUM"
          sha256sum "$ISO" | sed "s|${ISO}|${LATEST_NAME}|" > "$LATEST_CHECKSUM_PATH"
          echo "latest_path=${LATEST_CHECKSUM_PATH}" >> "$GITHUB_OUTPUT"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: snow-live-iso
          path: |
            ${{ steps.iso.outputs.path }}
            ${{ steps.checksum.outputs.latest_path }}
          retention-days: 7

      - name: Boot verification (UEFI + serial)
        id: boot_verify
        continue-on-error: true
        timeout-minutes: 10
        run: |
          sudo apt-get install -y qemu-system-x86 ovmf socat imagemagick -qq

          ISO="${{ steps.iso.outputs.path }}"
          EFI_CODE=""; EFI_VARS=""
          for f in /usr/share/OVMF/OVMF_CODE_4M.fd /usr/share/OVMF/OVMF_CODE.fd; do
            [ -f "$f" ] && EFI_CODE="$f" && break
          done
          for f in /usr/share/OVMF/OVMF_VARS_4M.fd /usr/share/OVMF/OVMF_VARS.fd; do
            if [ -f "$f" ]; then cp "$f" /tmp/EFI_VARS.fd; EFI_VARS="/tmp/EFI_VARS.fd"; break; fi
          done

          PFLASH=()
          if [ -n "$EFI_CODE" ] && [ -n "$EFI_VARS" ]; then
            PFLASH+=(-drive "if=pflash,format=raw,readonly=on,file=$EFI_CODE")
            PFLASH+=(-drive "if=pflash,format=raw,file=$EFI_VARS")
          fi

          sudo qemu-system-x86_64 \
            -machine type=q35,accel=kvm \
            -cpu host -m 4G -smp 2 \
            "${PFLASH[@]}" \
            -cdrom "$ISO" -boot d \
            -monitor unix:/tmp/qemu-monitor.sock,server,nowait \
            -serial file:/tmp/serial.log \
            -display none -daemonize

          for i in $(seq 1 30); do [ -S /tmp/qemu-monitor.sock ] && break; sleep 2; done

          echo "==> Waiting up to 5 minutes for live-ready..."
          for i in $(seq 1 60); do
            sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" \
              /tmp/serial.log 2>/dev/null && \
              { echo "==> Ready after $((i*5))s"; break; }
            [ "$i" -eq 60 ] && echo "WARNING: timed out" || true
            sleep 5
          done

          echo "screendump /tmp/screenshot.ppm" | \
            sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true
          sleep 2
          sudo test -f /tmp/screenshot.ppm && \
            sudo convert /tmp/screenshot.ppm screenshot.png 2>/dev/null || true
          echo "quit" | sudo socat - UNIX-CONNECT:/tmp/qemu-monitor.sock || true

          sudo grep -qE "DAKOTA_LIVE_READY|Finished live-ready\.service" \
            /tmp/serial.log || \
            { echo "ERROR: live environment did not reach ready state"
              sudo tail -50 /tmp/serial.log; exit 1; }

      - name: Upload ISO to Cloudflare R2
        if: >
          inputs.skip_upload != true &&
          github.event_name != 'pull_request' &&
          steps.boot_verify.outcome == 'success'
        env:
          RCLONE_CONFIG_R2_TYPE: s3
          RCLONE_CONFIG_R2_PROVIDER: Cloudflare
          RCLONE_CONFIG_R2_REGION: auto
          RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          if [ -z "${RCLONE_CONFIG_R2_ACCESS_KEY_ID}" ]; then
            echo "::warning::R2 secrets not available to this repo — skipping upload (ISO is in the workflow artifact)"
            exit 0
          fi
          sudo apt-get install -y rclone -qq
          ISO="${{ steps.iso.outputs.path }}"
          LATEST_NAME="${{ steps.iso.outputs.latest_name }}"
          LATEST_CHECKSUM="${LATEST_NAME}-CHECKSUM"
          BASE="${ISO_NAME}"
          DEST="R2:${R2_BUCKET_PATH}"

          # Rotate stable backups before publishing new latest.
          FILES="$(rclone lsf "$DEST" --files-only || true)"
          exists() { grep -Fxq "$1" <<<"$FILES"; }
          move_if_exists() {
            local src="$1" dst="$2"
            if exists "${src}"; then
              rclone moveto --log-level INFO --s3-no-check-bucket \
                "${DEST}/${src}" "${DEST}/${dst}"
            fi
          }

          move_if_exists "${BASE}-backup-2.iso" "${BASE}-backup-3.iso"
          move_if_exists "${BASE}-backup-2.iso-CHECKSUM" "${BASE}-backup-3.iso-CHECKSUM"
          move_if_exists "${BASE}-backup-1.iso" "${BASE}-backup-2.iso"
          move_if_exists "${BASE}-backup-1.iso-CHECKSUM" "${BASE}-backup-2.iso-CHECKSUM"
          move_if_exists "${LATEST_NAME}" "${BASE}-backup-1.iso"
          move_if_exists "${LATEST_CHECKSUM}" "${BASE}-backup-1.iso-CHECKSUM"

          # Delete backup slots beyond 3.
          rclone lsf "$DEST" --files-only | grep -E "^${BASE}-backup-[0-9]+\\.iso(-CHECKSUM)?$" | \
          while read -r f; do
            n="$(sed -E "s/^${BASE}-backup-([0-9]+).*/\\1/" <<<"${f}")"
            if [[ "${n}" -gt 3 ]]; then
              rclone deletefile --log-level INFO --s3-no-check-bucket "${DEST}/${f}"
            fi
          done

          rclone copyto --log-level INFO --s3-no-check-bucket "$ISO" "${DEST}/${LATEST_NAME}"
          rclone copyto --log-level INFO --s3-no-check-bucket "${{ steps.checksum.outputs.latest_path }}" "${DEST}/${LATEST_NAME}-CHECKSUM"

      - name: Publish latest URLs summary
        if: >
          inputs.skip_upload != true &&
          github.event_name != 'pull_request' &&
          steps.boot_verify.outcome == 'success'
        run: |
          LATEST_NAME="${{ steps.iso.outputs.latest_name }}"
          echo "## Latest Snow ISO URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- [${LATEST_NAME}](https://repository.frostyard.org/isos/${LATEST_NAME})" >> "$GITHUB_STEP_SUMMARY"
          echo "- [${LATEST_NAME}-CHECKSUM](https://repository.frostyard.org/isos/${LATEST_NAME}-CHECKSUM)" >> "$GITHUB_STEP_SUMMARY"

      - name: Boot verification status
        if: always() && steps.boot_verify.outcome == 'failure'
        run: |
          echo "::error::Snow ISO failed the UEFI smoke boot — upload was skipped"
          exit 1
